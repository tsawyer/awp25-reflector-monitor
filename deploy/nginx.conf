server {
    listen 80;
    listen [::]:80;
    server_name monitor.example.org;

    root /opt/awp25-monitor/web;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self'; script-src 'self'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'" always;

    location = /status.json {
        alias /var/lib/awp25-monitor/status.json;
        default_type application/json;
        add_header Cache-Control "no-store, max-age=0" always;
        add_header X-Content-Type-Options nosniff always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location ~ /\. {
        deny all;
    }
}
