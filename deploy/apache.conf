<VirtualHost *:80>
    ServerName monitor.example.org

    DocumentRoot /opt/awp25-monitor/web
    DirectoryIndex index.html

    <Directory /opt/awp25-monitor/web>
        Options -Indexes
        AllowOverride None
        Require all granted

        Header always set Cache-Control "public, max-age=3600"
    </Directory>

    Alias /status.json /var/lib/awp25-monitor/status.json

    <Directory /var/lib/awp25-monitor>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    <Location /status.json>
        Header always set Cache-Control "no-store, max-age=0"
        Header always set Content-Type "application/json"
    </Location>

    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "no-referrer"
    Header always set Content-Security-Policy "default-src 'self'; style-src 'self'; script-src 'self'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'"

    ErrorLog ${APACHE_LOG_DIR}/awp25-monitor-error.log
    CustomLog ${APACHE_LOG_DIR}/awp25-monitor-access.log combined
</VirtualHost>
